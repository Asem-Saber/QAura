<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - QAura Demo Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        .header { background: #1a1a2e; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.5rem; }
        .nav a { color: #e0e0e0; text-decoration: none; margin-left: 1.5rem; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 2rem; }
        .welcome { font-size: 1.25rem; margin-bottom: 1.5rem; }
        .orders-table { width: 100%; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .orders-table th, .orders-table td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #eee; }
        .orders-table th { background: #f8f9fa; font-weight: 600; }
        .status { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
        .status.pending { background: #fff3e0; color: #e65100; }
        .status.completed { background: #e8f5e9; color: #2e7d32; }
        .empty { text-align: center; padding: 2rem; color: #666; }
    </style>
</head>
<body>
    <header class="header">
        <h1>QAura Demo Store</h1>
        <nav class="nav">
            <a href="/" data-testid="nav-home">Home</a>
            <a href="#" data-testid="nav-logout" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <p class="welcome" data-testid="welcome-message">Welcome, <span id="user-name" data-testid="user-name"></span>!</p>

        <h2>Your Orders</h2>
        <table class="orders-table" data-testid="orders-table">
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="orders-body" data-testid="orders-body">
            </tbody>
        </table>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) {
            window.location.href = '/login';
        }

        document.getElementById('user-name').textContent = user.name || 'User';

        async function loadOrders() {
            const res = await fetch('/api/orders', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/login';
                return;
            }

            const orders = await res.json();
            const tbody = document.getElementById('orders-body');

            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">No orders yet. Visit the store to place an order!</td></tr>';
                return;
            }

            tbody.innerHTML = orders.map(o => `
                <tr data-testid="order-row-${o.id}">
                    <td>#${o.id}</td>
                    <td>${o.product_name}</td>
                    <td>${o.quantity}</td>
                    <td>$${o.total_price.toFixed(2)}</td>
                    <td><span class="status ${o.status}">${o.status}</span></td>
                </tr>
            `).join('');
        }

        async function logout() {
            await fetch('/api/auth/logout', {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        loadOrders();
    </script>
</body>
</html>
