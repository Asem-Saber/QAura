<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAura Demo Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        .header { background: #1a1a2e; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.5rem; }
        .nav a { color: #e0e0e0; text-decoration: none; margin-left: 1.5rem; }
        .nav a:hover { color: white; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .product-card { background: white; border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product-card h3 { margin-bottom: 0.5rem; }
        .product-card .price { font-size: 1.25rem; color: #2d6a4f; font-weight: bold; }
        .product-card .stock { font-size: 0.85rem; color: #666; margin: 0.5rem 0; }
        .product-card .stock.out { color: #d32f2f; }
        .btn { display: inline-block; padding: 0.5rem 1rem; background: #1a1a2e; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #16213e; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        #message { padding: 1rem; margin: 1rem 0; border-radius: 4px; display: none; }
        #message.success { display: block; background: #e8f5e9; color: #2e7d32; }
        #message.error { display: block; background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <header class="header">
        <h1>QAura Demo Store</h1>
        <nav class="nav">
            <a href="/" data-testid="nav-home">Home</a>
            <a href="/login" data-testid="nav-login" id="login-link">Login</a>
            <a href="/dashboard" data-testid="nav-dashboard" id="dashboard-link" style="display:none;">Dashboard</a>
            <a href="#" data-testid="nav-logout" id="logout-link" style="display:none;" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">
        <h2>Products</h2>
        <div id="message"></div>
        <div class="products-grid" id="products-grid" data-testid="products-grid">
            <!-- Products loaded via JS -->
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');

        if (token) {
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('dashboard-link').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'inline';
        }

        async function loadProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const grid = document.getElementById('products-grid');

            grid.innerHTML = products.map(p => `
                <div class="product-card" data-testid="product-card-${p.id}">
                    <h3 data-testid="product-name">${p.name}</h3>
                    <p class="price" data-testid="product-price">$${p.price.toFixed(2)}</p>
                    <p class="stock ${p.stock === 0 ? 'out' : ''}" data-testid="product-stock">
                        ${p.stock > 0 ? `In stock: ${p.stock}` : 'Out of stock'}
                    </p>
                    <p>${p.description || ''}</p>
                    <button class="btn" data-testid="order-btn-${p.id}"
                        onclick="orderProduct(${p.id})"
                        ${!token ? 'disabled title="Login to order"' : ''}>
                        Order
                    </button>
                </div>
            `).join('');
        }

        async function orderProduct(productId) {
            const res = await fetch('/api/orders', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ product_id: productId, quantity: 1 })
            });

            const msg = document.getElementById('message');
            if (res.ok) {
                const data = await res.json();
                msg.className = 'success';
                msg.textContent = `Order placed! ${data.product} - $${data.total_price}`;
            } else {
                msg.className = 'error';
                msg.textContent = 'Failed to place order. Please login first.';
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        loadProducts();
    </script>
</body>
</html>
